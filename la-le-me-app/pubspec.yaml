name: la_le_me_app
description: 隐私优先的生理健康记录与轻社交排名应用
version: 1.0.3+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.0
  uuid: ^4.3.3
  http: ^1.2.0
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.1
  local_auth: ^2.2.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  web_socket_channel: ^3.0.3
  crypto: ^3.0.3
  pointycastle: ^3.8.0
  url_launcher: ^6.2.4
  package_info_plus: ^9.0.1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0
  share_plus: ^7.2.1
  flutter_lints: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
